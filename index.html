async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
      ...(options.headers || {})
    }
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function cargarGestiones() {

function verificarCumplimiento(clienteId, gestiones) {
  const ahora = new Date();
  const hora = ahora.getHours() + ahora.getMinutes() / 60;
  const dia = ahora.getDay();
  const fechaHoy = ahora.toISOString().split("T")[0];
  if (FESTIVOS.includes(fechaHoy)) return { permitido: false, motivo: "Hoy es festivo. La Ley 2300 prohíbe gestiones en días festivos." };
  if (dia === 0) return { permitido: false, motivo: "Los domingos están prohibidos para gestiones de cobranza." };
  if (dia === 6 && (hora < 8 || hora >= 15)) return { permitido: false, motivo: "Sábados solo entre 8:00 AM y 3:00 PM." };
  if (dia >= 1 && dia <= 5 && (hora < 7 || hora >= 19)) return { permitido: false, motivo: "Lunes a viernes solo entre 7:00 AM y 7:00 PM." };
  const yaHoy = gestiones.some(g => (g.clienteId || g.cliente_id) === clienteId && (g.timestamp || g.created_at || "").startsWith(fechaHoy));
  if (yaHoy) return { permitido: false, motivo: "Ya fue contactado hoy. Máximo un contacto por día (Ley 2300)." };
  return { permitido: true, motivo: null };
}

function formatPeso(v) {
  return new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 }).format(v);
}

function PantallaGestion({ cliente, etapa, gestiones, onGuardar, onVolver, onAbrirWhatsApp }) {
  const [resultado, setResultado] = useState("");
  const [fecha, setFecha] = useState("");
  const [monto, setMonto] = useState("");
  const [medioPago, setMedioPago] = useState("");
  const [observaciones, setObservaciones] = useState("");
  const [guardado, setGuardado] = useState(false);
  const [guardando, setGuardando] = useState(false);
  const [errorGuardar, setErrorGuardar] = useState("");
  const [sugerenciaIA, setSugerenciaIA] = useState("");
  const [cargandoIA, setCargandoIA] = useState(false);
  const cfg = ETAPA_CONFIG[etapa];
  const cum = verificarCumplimiento(cliente.id, gestiones);
  const RESULTADOS = ["Contactado - sin compromiso", "Compromiso de pago", "No contestó", "Número equivocado", "Ya pagó"];

  async function pedirIA() {
    setCargandoIA(true); setSugerenciaIA("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: "Eres asistente de cobranza colombiano. Responde en español natural, máximo 4 oraciones, sin bullets.", messages: [{ role: "user", content: `Cliente: ${cliente.nombre}\nDeuda: ${formatPeso(cliente.saldo)}\nDías mora: ${cliente.diasMora}\nEtapa: ${etapa}\nResultado: ${resultado || "sin gestión"}\n\nDame sugerencia corta para abordar esta gestión.` }] })
      });
      const d = await res.json();
      setSugerenciaIA(d.content?.find(b => b.type === "text")?.text || "Sin respuesta.");
    } catch { setSugerenciaIA("No se pudo conectar con el agente IA."); }
    setCargandoIA(false);
  }

  async function handleGuardar() {
    if (!resultado || guardado || !cum.permitido) return;
    setGuardando(true); setErrorGuardar("");
    try {
      await onGuardar({ clienteId: cliente.id, clienteNombre: cliente.nombre, cedula: cliente.cedula, etapa, resultado, fechaCompromiso: fecha || null, montoCompromiso: monto || null, medioPago: medioPago || null, observaciones, cobrador: etapa });
      setGuardado(true);
      setTimeout(() => onVolver(), 1200);
    } catch(e) { setErrorGuardar("Error al guardar. Intenta de nuevo."); }
    setGuardando(false);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a" }}>
      <div style={{ borderBottom: "1px solid #1a1a1a", padding: "20px 24px", display: "flex", alignItems: "center", gap: 16, position: "sticky", top: 0, background: "#0a0a0a", zIndex: 10 }}>
        <button onClick={onVolver} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 18 }}>←</button>
        <div>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>{cliente.nombre}</div>
          <div style={{ color: "#444", fontSize: 11 }}>CC {cliente.cedula} · <Badge etapa={etapa} /></div>
        </div>
      </div>
      <div style={{ padding: "24px 24px", maxWidth: 640, margin: "0 auto" }}>
        {!cum.permitido && (
          <div style={{ background: "#1a0a00", border: "1px solid #ef444433", borderLeft: "3px solid #ef4444", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ color: "#ef4444", fontWeight: 700, fontSize: 12 }}>🔒 Gestión bloqueada — Ley 2300</div>
            <div style={{ color: "#888", fontSize: 11, marginTop: 4 }}>{cum.motivo}</div>
          </div>
        )}
        <div style={{ background: "#111", border: `1px solid ${cfg.color}22`, borderRadius: 10, padding: "16px 20px", marginBottom: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div><div style={{ color: "#444", fontSize: 10, textTransform: "uppercase" }}>Saldo</div><div style={{ color: cfg.color, fontWeight: 700, fontSize: 20 }}>{formatPeso(cliente.saldo)}</div></div>
          <div><div style={{ color: "#444", fontSize: 10, textTransform: "uppercase" }}>Días mora</div><div style={{ color: "#fff", fontWeight: 700, fontSize: 20 }}>{cliente.diasMora}</div></div>
          <div><div style={{ color: "#444", fontSize: 10, textTransform: "uppercase" }}>Teléfono</div><div style={{ color: "#aaa", fontSize: 13 }}>{cliente.telefono}</div></div>
          <div><div style={{ color: "#444", fontSize: 10, textTransform: "uppercase" }}>Cédula</div><div style={{ color: "#aaa", fontSize: 13 }}>{cliente.cedula}</div></div>
        </div>
        <div style={{ marginBottom: 20 }}>
          <div style={{ color: "#555", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>Resultado de la gestión</div>
          {RESULTADOS.map(r => (
            <button key={r} onClick={() => setResultado(r)}
              style={{ width: "100%", background: resultado === r ? cfg.color + "22" : "#111", border: resultado === r ? `1px solid ${cfg.color}` : "1px solid #1e1e1e", borderRadius: 8, padding: "10px 16px", color: resultado === r ? cfg.color : "#666", fontSize: 13, cursor: "pointer", textAlign: "left", marginBottom: 6, display: "block" }}>
              {resultado === r ? "● " : "○ "}{r}

              </div>
              <div>
                <div style={{ color: "#444", fontSize: 11, marginBottom: 6 }}>Monto comprometido</div>
                <input type="number" value={monto} onChange={e => setMonto(e.target.value)} style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 6, padding: "8px 10px", color: "#fff", fontSize: 12 }} />

              <button key={mp.id} onClick={() => setMedioPago(mp.id)}
                style={{ width: "100%", background: medioPago === mp.id ? "#22c55e11" : "#0a0a0a", border: medioPago === mp.id ? "1px solid #22c55e" : "1px solid #2a2a2a", borderRadius: 8, padding: "10px 14px", cursor: "pointer", textAlign: "left", marginBottom: 6, display: "block" }}>

        </div>
        <div style={{ marginBottom: 16 }}>
          <button onClick={pedirIA} style={{ background: "none", border: "1px solid #2a2a2a", color: "#555", fontSize: 11, padding: "8px 14px", borderRadius: 6, cursor: "pointer" }}>✦ Sugerencia del agente IA</button>
          {(cargandoIA || sugerenciaIA) && (
            <div style={{ marginTop: 10, background: "#0d1117", border: "1px solid #1e3a2a", borderRadius: 8, padding: "12px 16px" }}>
              {cargandoIA ? <div style={{ color: "#22c55e", fontSize: 12 }}>Pensando...</div> : <div style={{ color: "#aaa", fontSize: 12, lineHeight: 1.6 }}>{sugerenciaIA}</div>}
            </div>
          )}
        </div>
        <button onClick={onAbrirWhatsApp}
          style={{ width: "100%", background: "#0d1f14", border: "1px solid #25d36622", borderRadius: 10, padding: 12, color: "#25d366", fontWeight: 600, fontSize: 13, cursor: "pointer", marginBottom: 12 }}>
          💬 Abrir asistente WhatsApp
        </button>
        {errorGuardar && <div style={{ color: "#ef4444", fontSize: 11, marginBottom: 8 }}>{errorGuardar}</div>}
        <button onClick={handleGuardar} disabled={!resultado || guardado || !cum.permitido || guardando}
          style={{ width: "100%", background: guardado ? "#22c55e" : (resultado && cum.permitido) ? cfg.color : "#1a1a1a", border: "none", borderRadius: 10, padding: 14, color: (resultado && cum.permitido) ? "#000" : "#333", fontWeight: 700, fontSize: 14, cursor: (resultado && cum.permitido && !guardando) ? "pointer" : "not-allowed" }}>
          {guardado ? "✓ Guardado en Supabase" : guardando ? "Guardando..." : !cum.permitido ? "🔒 Bloqueado — Ley 2300" : "Registrar gestión"}
        </button>
      </div>
    </div>
  );
}

function PantallaWhatsApp({ cliente, etapa, gestiones, onVolver }) {
  const cfg = ETAPA_CONFIG[etapa];
  const [mensajes, setMensajes] = useState([{ rol: "sistema", texto: `Conversación con ${cliente.nombre} iniciada.`, hora: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) }]);
  const [inputCliente, setInputCliente] = useState("");
  const [inputCobrador, setInputCobrador] = useState("");
  const [cargando, setCargando] = useState(false);
  const [sugerencia, setSugerencia] = useState("");

  async function pedirSugerencia(msg, hilo) {
    setCargando(true); setSugerencia("");
    try {
      const hiloTxt = hilo.filter(m => m.rol !== "sistema").map(m => `${m.rol === "cliente" ? cliente.nombre : "Cobrador"}: ${m.texto}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: "Eres asistente de cobranza colombiano. Sugiere el mejor mensaje WhatsApp. Empático pero firme. Nunca amenaces (Ley 2300). Máximo 3 oraciones. Responde SOLO con el texto sugerido.", messages: [{ role: "user", content: `Cliente: ${cliente.nombre}\nDeuda: ${formatPeso(cliente.saldo)} · ${cliente.diasMora} días\n\nHilo:\n${hiloTxt}\n\nÚltimo mensaje: "${msg}"\n\nSugiere respuesta.` }] })
      });
      const d = await res.json();
      const txt = d.content?.find(b => b.type === "text")?.text || "";
      setSugerencia(txt); setInputCobrador(txt);
    } catch { setSugerencia("No se pudo generar sugerencia."); }
    setCargando(false);
  }

  function agregarCliente() {
    if (!inputCliente.trim()) return;
    const hora = new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" });
    const nuevo = { rol: "cliente", texto: inputCliente.trim(), hora };
    const hilo = [...mensajes, nuevo];
    setMensajes(hilo); pedirSugerencia(inputCliente.trim(), hilo); setInputCliente("");
  }

  function enviarCobrador() {
    if (!inputCobrador.trim()) return;
    setMensajes(p => [...p, { rol: "cobrador", texto: inputCobrador.trim(), hora: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) }]);
    setInputCobrador(""); setSugerencia("");
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", display: "flex", flexDirection: "column" }}>
      <div style={{ borderBottom: "1px solid #1a1a1a", padding: "16px 24px", display: "flex", alignItems: "center", gap: 14, background: "#0a0a0a", position: "sticky", top: 0, zIndex: 10 }}>
        <button onClick={onVolver} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 18 }}>←</button>
        <div style={{ width: 36, height: 36, borderRadius: "50%", background: cfg.color + "22", border: `1px solid ${cfg.color}44`, display: "flex", alignItems: "center", justifyContent: "center", color: cfg.color, fontWeight: 700 }}>{cliente.nombre.charAt(0)}</div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>{cliente.nombre}</div>
          <div style={{ color: "#444", fontSize: 10 }}>{cliente.telefono}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ color: cfg.color, fontWeight: 700, fontSize: 13 }}>{formatPeso(cliente.saldo)}</div>
          <div style={{ color: "#444", fontSize: 10 }}>{cliente.diasMora} días</div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px", display: "flex", flexDirection: "column", gap: 12 }}>
        {mensajes.map((m, i) => {
          if (m.rol === "sistema") return <div key={i} style={{ textAlign: "center" }}><span style={{ background: "#111", border: "1px solid #1e1e1e", color: "#444", fontSize: 10, padding: "4px 12px", borderRadius: 20 }}>{m.texto}</span></div>;
          const esCob = m.rol === "cobrador";
          return (
            <div key={i} style={{ display: "flex", justifyContent: esCob ? "flex-end" : "flex-start" }}>
              <div style={{ maxWidth: "72%", background: esCob ? cfg.color + "18" : "#161616", border: esCob ? `1px solid ${cfg.color}33` : "1px solid #1e1e1e", borderRadius: esCob ? "12px 12px 2px 12px" : "12px 12px 12px 2px", padding: "10px 14px" }}>
                <div style={{ color: esCob ? "#ddd" : "#aaa", fontSize: 13, lineHeight: 1.5 }}>{m.texto}</div>
                <div style={{ color: "#333", fontSize: 9, marginTop: 4, textAlign: "right" }}>{m.hora}</div>
              </div>
            </div>
          );
        })}
        {(cargando || sugerencia) && (
          <div style={{ background: "#0d1a12", border: "1px solid #1e3a2a", borderRadius: 10, padding: "12px 14px" }}>
            <div style={{ color: "#22c55e", fontSize: 10, textTransform: "uppercase", marginBottom: 6 }}>✦ Sugerencia IA</div>
            {cargando ? <div style={{ color: "#22c55e55", fontSize: 12 }}>Generando...</div> : <div style={{ color: "#aaa", fontSize: 12, lineHeight: 1.6 }}>{sugerencia}</div>}
          </div>
        )}
      </div>
      <div style={{ borderTop: "1px solid #1a1a1a", padding: "12px 24px", background: "#0d0d0d" }}>
        <div style={{ color: "#333", fontSize: 10, marginBottom: 6, textTransform: "uppercase" }}>Simular mensaje del cliente</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={inputCliente} onChange={e => setInputCliente(e.target.value)} onKeyDown={e => e.key === "Enter" && agregarCliente()} placeholder="Lo que dice el cliente..."
            style={{ flex: 1, background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "8px 12px", color: "#aaa", fontSize: 12 }} />
          <button onClick={agregarCliente} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 8, padding: "8px 14px", color: "#555", cursor: "pointer", fontSize: 12 }}>→</button>
        </div>
      </div>
      <div style={{ borderTop: "1px solid #1e1e1e", padding: "12px 24px 20px", background: "#0a0a0a" }}>
        <div style={{ color: "#333", fontSize: 10, marginBottom: 6, textTransform: "uppercase" }}>Tu respuesta</div>
        <div style={{ display: "flex", gap: 8 }}>
          <textarea value={inputCobrador} onChange={e => setInputCobrador(e.target.value)} rows={2} placeholder="Edita o escribe tu respuesta..."
            style={{ flex: 1, background: "#111", border: `1px solid ${cfg.color}33`, borderRadius: 8, padding: "8px 12px", color: "#ddd", fontSize: 12, resize: "none" }} />
          <button onClick={enviarCobrador} disabled={!inputCobrador.trim()}
            style={{ background: inputCobrador.trim() ? cfg.color : "#1a1a1a", border: "none", borderRadius: 8, padding: "8px 16px", color: inputCobrador.trim() ? "#000" : "#333", cursor: inputCobrador.trim() ? "pointer" : "not-allowed", fontSize: 13, fontWeight: 700, alignSelf: "flex-end" }}>
            Enviar
          </button>
        </div>
      </div>
    </div>
  );
}

function PantallaRegistros({ gestiones, cargando, onVolver }) {
  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a" }}>
      <div style={{ borderBottom: "1px solid #1a1a1a", padding: "20px 24px", display: "flex", alignItems: "center", gap: 16, position: "sticky", top: 0, background: "#0a0a0a" }}>
        <button onClick={onVolver} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 18 }}>←</button>
        <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>Registros del día</div>
        <div style={{ color: "#444", fontSize: 12, marginLeft: "auto" }}>{gestiones.length} gestiones</div>
      </div>
      <div style={{ padding: "24px 24px", maxWidth: 800, margin: "0 auto" }}>
        {cargando ? (
          <div style={{ color: "#444", textAlign: "center", marginTop: 80 }}>Cargando desde Supabase...</div>
        ) : gestiones.length === 0 ? (
          <div style={{ color: "#333", textAlign: "center", marginTop: 80, fontSize: 14 }}>No hay gestiones registradas aún</div>
        ) : (
          gestiones.map(g => {
            const etapa = g.etapa || g.cobrador || "Corriente";
            const cfg = ETAPA_CONFIG[etapa] || ETAPA_CONFIG.Corriente;
            const ts = g.timestamp || g.created_at || "";
            return (
              <div key={g.id} style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 10, padding: "14px 18px", marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <div style={{ color: "#fff", fontWeight: 600, fontSize: 13 }}>{g.clienteNombre || g.cliente_nombre}</div>
                  <div style={{ color: "#333", fontSize: 10 }}>{ts ? new Date(ts).toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) : ""}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <Badge etapa={etapa} />
                  <span style={{ fontSize: 11, color: g.resultado === "Compromiso de pago" ? "#22c55e" : g.resultado === "No contestó" ? "#f59e0b" : "#666", fontWeight: 600 }}>{g.resultado}</span>
                  {(g.fechaCompromiso || g.fecha_compromiso) && <span style={{ color: "#444", fontSize: 10 }}>· Pago: {g.fechaCompromiso || g.fecha_compromiso}</span>}
                  {(g.montoCompromiso || g.monto_compromiso) && <span style={{ color: cfg.color, fontSize: 10 }}>· {formatPeso(Number(g.montoCompromiso || g.monto_compromiso))}</span>}
                </div>
                {g.observaciones && <div style={{ color: "#444", fontSize: 11, marginTop: 6, borderTop: "1px solid #1a1a1a", paddingTop: 6 }}>{g.observaciones}</div>}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function App() {
  const [pantalla, setPantalla] = useState("login");
  const [etapaActiva, setEtapaActiva] = useState(null);
  const [clienteActivo, setClienteActivo] = useState(null);
  const [gestiones, setGestiones] = useState([]);
  const [cargandoGestiones, setCargandoGestiones] = useState(false);

  useEffect(() => { fetchGestiones(); }, []);

  async function fetchGestiones() {
    setCargandoGestiones(true);
    try { const data = await cargarGestiones(); setGestiones(data); } catch(e) { console.error(e); }
    setCargandoGestiones(false);
  }

  async function handleGuardarGestion(gestion) {
    await guardarGestionDB(gestion);
    await fetchGestiones();
  }

  if (pantalla === "login") return <PantallaLogin onSelect={e => { setEtapaActiva(e); setPantalla("listado"); }} />;
  if (pantalla === "registros") return <PantallaRegistros gestiones={gestiones} cargando={cargandoGestiones} onVolver={() => setPantalla("listado")} />;
  if (pantalla === "whatsapp" && clienteActivo) return <PantallaWhatsApp cliente={clienteActivo} etapa={etapaActiva} gestiones={gestiones} onVolver={() => setPantalla("gestion")} />;
  if (pantalla === "gestion" && clienteActivo) return <PantallaGestion cliente={clienteActivo} etapa={etapaActiva} gestiones={gestiones} onGuardar={handleGuardarGestion} onVolver={() => setPantalla("listado")} onAbrirWhatsApp={() => setPantalla("whatsapp")} />;
  return <PantallaListado etapa={etapaActiva} gestiones={gestiones} onSeleccionarCliente={c => { setClienteActivo(c); setPantalla("gestion"); }} onVerRegistros={() => setPantalla("registros")} onCerrar={() => setPantalla("login")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

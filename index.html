async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
      ...(options.headers || {})
    }
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function cargarGestiones() {

async function loginConRPC(email, password) {

      "Authorization": `Bearer ${SUPABASE_KEY}`,

function verificarCumplimiento(clienteId, gestiones) {
  const ahora = new Date();
  const hora = ahora.getHours() + ahora.getMinutes() / 60;
  const dia = ahora.getDay();
  const fechaHoy = ahora.toISOString().split("T")[0];
  if (FESTIVOS.includes(fechaHoy)) return { permitido: false, motivo: "Hoy es festivo. La Ley 2300 prohíbe gestiones en días festivos." };
  if (dia === 0) return { permitido: false, motivo: "Los domingos están prohibidos para gestiones de cobranza." };
  if (dia === 6 && (hora < 8 || hora >= 15)) return { permitido: false, motivo: "Sábados solo entre 8:00 AM y 3:00 PM." };
  if (dia >= 1 && dia <= 5 && (hora < 7 || hora >= 19)) return { permitido: false, motivo: "Lunes a viernes solo entre 7:00 AM y 7:00 PM." };
  const yaHoy = gestiones.some(g => (g.clienteId || g.cliente_id) === clienteId && (g.timestamp || g.created_at || "").startsWith(fechaHoy));
  if (yaHoy) return { permitido: false, motivo: "Ya fue contactado hoy. Máximo un contacto por día (Ley 2300)." };
  return { permitido: true, motivo: null };
}

        <div style={{ background: "#181818", border: `1px solid ${cfg.color}33`, borderRadius: 12, padding: "18px 20px", marginBottom: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div><div style={{ color: "#666", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Saldo</div><div style={{ color: cfg.color, fontWeight: 700, fontSize: 21 }}>{formatPeso(cliente.saldo)}</div></div>
          <div><div style={{ color: "#666", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Días mora</div><div style={{ color: "#fff", fontWeight: 700, fontSize: 21 }}>{cliente.diasMora}</div></div>
          <div><div style={{ color: "#666", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Teléfono</div><div style={{ color: "#ccc", fontSize: 14 }}>{cliente.telefono}</div></div>
          <div><div style={{ color: "#666", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Cédula</div><div style={{ color: "#ccc", fontSize: 14 }}>{cliente.cedula}</div></div>
        </div>
        <div style={{ marginBottom: 22 }}>
          <div style={{ color: "#777", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>Resultado de la gestión</div>
          {RESULTADOS.map(r => (
            <button key={r} onClick={() => setResultado(r)}
              style={{ width: "100%", background: resultado === r ? cfg.color + "20" : "#181818", border: resultado === r ? `1px solid ${cfg.color}` : "1px solid #252525", borderRadius: 10, padding: "12px 16px", color: resultado === r ? cfg.color : "#aaa", fontSize: 14, cursor: "pointer", textAlign: "left", marginBottom: 8, display: "block" }}>
              {resultado === r ? "● " : "○ "}{r}
            </button>
          ))}
        </div>
        {resultado === "Compromiso de pago" && (
          <div style={{ background: "#181818", border: "1px solid #252525", borderRadius: 12, padding: 18, marginBottom: 22 }}>
            <div style={{ color: "#777", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>Compromiso de pago</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
              <div>
                <div style={{ color: "#666", fontSize: 12, marginBottom: 8 }}>Fecha prometida</div>
                <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} style={{ width: "100%", background: "#111", border: "1px solid #333", borderRadius: 8, padding: "9px 12px", color: "#fff", fontSize: 13 }} />
              </div>
              <div>
                <div style={{ color: "#666", fontSize: 12, marginBottom: 8 }}>Monto comprometido</div>
                <input type="number" value={monto} onChange={e => setMonto(e.target.value)} placeholder="0" style={{ width: "100%", background: "#111", border: "1px solid #333", borderRadius: 8, padding: "9px 12px", color: "#fff", fontSize: 13 }} />
              </div>
            </div>
            <div style={{ color: "#666", fontSize: 12, marginBottom: 10 }}>Medio de pago</div>
            {MEDIOS_PAGO.map(mp => (
              <button key={mp.id} onClick={() => setMedioPago(mp.id)}
                style={{ width: "100%", background: medioPago === mp.id ? "#22c55e15" : "#111", border: medioPago === mp.id ? "1px solid #22c55e" : "1px solid #2a2a2a", borderRadius: 10, padding: "11px 14px", cursor: "pointer", textAlign: "left", marginBottom: 8, display: "block" }}>
                <div style={{ color: medioPago === mp.id ? "#22c55e" : "#aaa", fontSize: 13, fontWeight: 600 }}>{mp.label}</div>
                <div style={{ color: "#555", fontSize: 11, marginTop: 3 }}>{mp.detalle}</div>
              </button>
            ))}
          </div>
        )}
        <div style={{ marginBottom: 22 }}>
          <div style={{ color: "#777", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>Observaciones</div>
          <textarea value={observaciones} onChange={e => setObservaciones(e.target.value)} rows={3} placeholder="Notas sobre la gestión..."
            style={{ width: "100%", background: "#181818", border: "1px solid #252525", borderRadius: 10, padding: "12px 14px", color: "#ccc", fontSize: 13, resize: "vertical" }} />
        </div>
        <div style={{ marginBottom: 18 }}>
          <button onClick={pedirIA} style={{ background: "#181818", border: "1px solid #333", color: "#aaa", fontSize: 12, padding: "10px 16px", borderRadius: 8, cursor: "pointer" }}>✦ Sugerencia del agente IA</button>
          {(cargandoIA || sugerenciaIA) && (
            <div style={{ marginTop: 12, background: "#0d1a12", border: "1px solid #1e3a2a", borderRadius: 10, padding: "14px 16px" }}>
              {cargandoIA ? <div style={{ color: "#22c55e", fontSize: 13 }}>Pensando...</div> : <div style={{ color: "#ccc", fontSize: 13, lineHeight: 1.7 }}>{sugerenciaIA}</div>}
            </div>
          )}
        </div>
        <button onClick={onAbrirWhatsApp}
          style={{ width: "100%", background: "#0d2018", border: "1px solid #25d36633", borderRadius: 12, padding: 14, color: "#25d366", fontWeight: 600, fontSize: 14, cursor: "pointer", marginBottom: 12 }}>
          💬 Abrir asistente WhatsApp
        </button>
        {errorGuardar && <div style={{ color: "#f87171", fontSize: 12, marginBottom: 10, textAlign: "center" }}>{errorGuardar}</div>}
        <button onClick={handleGuardar} disabled={!resultado || guardado || !cum.permitido || guardando}
          style={{ width: "100%", background: guardado ? "#22c55e" : (resultado && cum.permitido) ? cfg.color : "#222", border: "none", borderRadius: 12, padding: 16, color: (resultado && cum.permitido) ? "#000" : "#555", fontWeight: 700, fontSize: 15, cursor: (resultado && cum.permitido && !guardando) ? "pointer" : "not-allowed" }}>
          {guardado ? "✓ Guardado" : guardando ? "Guardando..." : !cum.permitido ? "🔒 Bloqueado — Ley 2300" : "Registrar gestión"}
        </button>
      </div>
    </div>
  );
}

// ─── WHATSAPP ─────────────────────────────────────────────────────────────────
function PantallaWhatsApp({ cliente, etapa, gestiones, onVolver }) {
  const cfg = ETAPA_CONFIG[etapa];
  const [mensajes, setMensajes] = useState([{ rol: "sistema", texto: `Conversación con ${cliente.nombre} iniciada.`, hora: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) }]);
  const [inputCliente, setInputCliente] = useState("");
  const [inputCobrador, setInputCobrador] = useState("");
  const [cargando, setCargando] = useState(false);
  const [sugerencia, setSugerencia] = useState("");

  async function pedirSugerencia(msg, hilo) {
    setCargando(true); setSugerencia("");
    try {
      const hiloTxt = hilo.filter(m => m.rol !== "sistema").map(m => `${m.rol === "cliente" ? cliente.nombre : "Cobrador"}: ${m.texto}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: "Eres asistente de cobranza colombiano. Sugiere el mejor mensaje WhatsApp. Empático pero firme. Nunca amenaces (Ley 2300). Máximo 3 oraciones. Responde SOLO con el texto sugerido.", messages: [{ role: "user", content: `Cliente: ${cliente.nombre}\nDeuda: ${formatPeso(cliente.saldo)} · ${cliente.diasMora} días\n\nHilo:\n${hiloTxt}\n\nÚltimo mensaje: "${msg}"\n\nSugiere respuesta.` }] })
      });
      const d = await res.json();
      const txt = d.content?.find(b => b.type === "text")?.text || "";
      setSugerencia(txt); setInputCobrador(txt);
    } catch { setSugerencia("No se pudo generar sugerencia."); }
    setCargando(false);
  }

  function agregarCliente() {
    if (!inputCliente.trim()) return;
    const hora = new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" });
    const nuevo = { rol: "cliente", texto: inputCliente.trim(), hora };
    const hilo = [...mensajes, nuevo];
    setMensajes(hilo); pedirSugerencia(inputCliente.trim(), hilo); setInputCliente("");
  }

  function enviarCobrador() {
    if (!inputCobrador.trim()) return;
    setMensajes(p => [...p, { rol: "cobrador", texto: inputCobrador.trim(), hora: new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) }]);
    setInputCobrador(""); setSugerencia("");
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", display: "flex", flexDirection: "column" }}>
      <div style={{ borderBottom: "1px solid #222", padding: "16px 24px", display: "flex", alignItems: "center", gap: 14, background: "#0f0f0f", position: "sticky", top: 0, zIndex: 10 }}>
        <button onClick={onVolver} style={{ background: "none", border: "none", color: "#777", cursor: "pointer", fontSize: 20 }}>←</button>
        <div style={{ width: 38, height: 38, borderRadius: "50%", background: cfg.color + "22", border: `1px solid ${cfg.color}55`, display: "flex", alignItems: "center", justifyContent: "center", color: cfg.color, fontWeight: 700, fontSize: 15 }}>{cliente.nombre.charAt(0)}</div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 15 }}>{cliente.nombre}</div>
          <div style={{ color: "#666", fontSize: 11, marginTop: 2 }}>{cliente.telefono}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ color: cfg.color, fontWeight: 700, fontSize: 14 }}>{formatPeso(cliente.saldo)}</div>
          <div style={{ color: "#666", fontSize: 11 }}>{cliente.diasMora} días</div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px", display: "flex", flexDirection: "column", gap: 12 }}>
        {mensajes.map((m, i) => {
          if (m.rol === "sistema") return <div key={i} style={{ textAlign: "center" }}><span style={{ background: "#1a1a1a", border: "1px solid #222", color: "#666", fontSize: 11, padding: "5px 14px", borderRadius: 20 }}>{m.texto}</span></div>;
          const esCob = m.rol === "cobrador";
          return (
            <div key={i} style={{ display: "flex", justifyContent: esCob ? "flex-end" : "flex-start" }}>
              <div style={{ maxWidth: "75%", background: esCob ? cfg.color + "18" : "#1a1a1a", border: esCob ? `1px solid ${cfg.color}33` : "1px solid #252525", borderRadius: esCob ? "14px 14px 2px 14px" : "14px 14px 14px 2px", padding: "11px 15px" }}>
                <div style={{ color: esCob ? "#e0e0e0" : "#bbb", fontSize: 14, lineHeight: 1.6 }}>{m.texto}</div>
                <div style={{ color: "#444", fontSize: 10, marginTop: 5, textAlign: "right" }}>{m.hora}</div>
              </div>
            </div>
          );
        })}
        {(cargando || sugerencia) && (
          <div style={{ background: "#0d1a12", border: "1px solid #1e3a2a", borderRadius: 12, padding: "14px 16px" }}>
            <div style={{ color: "#22c55e", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>✦ Sugerencia IA</div>
            {cargando ? <div style={{ color: "#22c55e55", fontSize: 13 }}>Generando...</div> : <div style={{ color: "#ccc", fontSize: 13, lineHeight: 1.7 }}>{sugerencia}</div>}
          </div>
        )}
      </div>
      <div style={{ borderTop: "1px solid #222", padding: "14px 24px", background: "#111" }}>
        <div style={{ color: "#555", fontSize: 10, marginBottom: 8, textTransform: "uppercase" }}>Simular mensaje del cliente</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={inputCliente} onChange={e => setInputCliente(e.target.value)} onKeyDown={e => e.key === "Enter" && agregarCliente()} placeholder="Lo que dice el cliente..."
            style={{ flex: 1, background: "#181818", border: "1px solid #2a2a2a", borderRadius: 10, padding: "10px 14px", color: "#ccc", fontSize: 13 }} />
          <button onClick={agregarCliente} style={{ background: "#222", border: "1px solid #333", borderRadius: 10, padding: "10px 16px", color: "#888", cursor: "pointer", fontSize: 14 }}>→</button>
        </div>
      </div>
      <div style={{ borderTop: "1px solid #1e1e1e", padding: "14px 24px 24px", background: "#0f0f0f" }}>
        <div style={{ color: "#555", fontSize: 10, marginBottom: 8, textTransform: "uppercase" }}>Tu respuesta</div>
        <div style={{ display: "flex", gap: 8 }}>
          <textarea value={inputCobrador} onChange={e => setInputCobrador(e.target.value)} rows={2} placeholder="Edita o escribe tu respuesta..."
            style={{ flex: 1, background: "#181818", border: `1px solid ${cfg.color}44`, borderRadius: 10, padding: "10px 14px", color: "#e0e0e0", fontSize: 13, resize: "none" }} />
          <button onClick={enviarCobrador} disabled={!inputCobrador.trim()}
            style={{ background: inputCobrador.trim() ? cfg.color : "#1a1a1a", border: "none", borderRadius: 10, padding: "10px 18px", color: inputCobrador.trim() ? "#000" : "#444", cursor: inputCobrador.trim() ? "pointer" : "not-allowed", fontSize: 16, fontWeight: 700, alignSelf: "flex-end" }}>↑</button>
        </div>
      </div>
    </div>
  );
}

// ─── REGISTROS ────────────────────────────────────────────────────────────────
function PantallaRegistros({ gestiones, cargando, onVolver }) {
  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f" }}>
      <div style={{ borderBottom: "1px solid #222", padding: "20px 24px", display: "flex", alignItems: "center", gap: 16, position: "sticky", top: 0, background: "#0f0f0f" }}>
        <button onClick={onVolver} style={{ background: "none", border: "none", color: "#777", cursor: "pointer", fontSize: 20 }}>←</button>
        <div style={{ color: "#fff", fontWeight: 700, fontSize: 18 }}>Registros del día</div>
        <div style={{ color: "#777", fontSize: 13, marginLeft: "auto" }}>{gestiones.length} gestiones</div>
      </div>
      <div style={{ padding: "24px", maxWidth: 800, margin: "0 auto" }}>
        {cargando ? (
          <div style={{ color: "#555", textAlign: "center", marginTop: 80, fontSize: 14 }}>Cargando...</div>
        ) : gestiones.length === 0 ? (
          <div style={{ color: "#444", textAlign: "center", marginTop: 80, fontSize: 14 }}>No hay gestiones registradas aún</div>
        ) : (
          gestiones.map(g => {
            const etapa = g.etapa || g.cobrador || "Corriente";
            const cfg = ETAPA_CONFIG[etapa] || ETAPA_CONFIG.Corriente;
            const ts = g.timestamp || g.created_at || "";
            return (
              <div key={g.id} style={{ background: "#181818", border: "1px solid #252525", borderLeft: `3px solid ${cfg.color}`, borderRadius: 10, padding: "14px 18px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>{g.clienteNombre || g.cliente_nombre}</div>
                  <div style={{ color: "#555", fontSize: 11 }}>{ts ? new Date(ts).toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" }) : ""}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <Badge etapa={etapa} />
                  <span style={{ fontSize: 12, color: g.resultado === "Compromiso de pago" ? "#22c55e" : g.resultado === "No contestó" ? "#f59e0b" : "#888", fontWeight: 600 }}>{g.resultado}</span>
                  {(g.fechaCompromiso || g.fecha_compromiso) && <span style={{ color: "#666", fontSize: 11 }}>· Pago: {g.fechaCompromiso || g.fecha_compromiso}</span>}
                  {(g.montoCompromiso || g.monto_compromiso) && <span style={{ color: cfg.color, fontSize: 11 }}>· {formatPeso(Number(g.montoCompromiso || g.monto_compromiso))}</span>}
                </div>
                {g.observaciones && <div style={{ color: "#777", fontSize: 12, marginTop: 8, borderTop: "1px solid #222", paddingTop: 8 }}>{g.observaciones}</div>}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [pantalla, setPantalla] = useState("login");
  const [usuario, setUsuario] = useState(null);
  const [etapaActiva, setEtapaActiva] = useState(null);
  const [clienteActivo, setClienteActivo] = useState(null);
  const [gestiones, setGestiones] = useState([]);
  const [cargandoGestiones, setCargandoGestiones] = useState(false);

  useEffect(() => { if (usuario) fetchGestiones(); }, [usuario]);

  async function fetchGestiones() {
    setCargandoGestiones(true);
    try { const data = await cargarGestiones(); setGestiones(data); } catch(e) { console.error(e); }
    setCargandoGestiones(false);
  }

  async function handleGuardarGestion(gestion) {
    await guardarGestionDB(gestion);
    await fetchGestiones();
  }

  function handleLogin(usr) {
    setUsuario(usr);
    if (usr.etapa === "todas") {
      setPantalla("selectEtapa");
    } else {
      setEtapaActiva(usr.etapa);
      setPantalla("listado");
    }
  }

  function handleCerrarSesion() {
    setUsuario(null); setEtapaActiva(null); setGestiones([]);
    setPantalla("login");
  }

  function handleVolverListado() {
    setClienteActivo(null);
    setPantalla("listado");
  }

  function handleVolverSelectEtapa() {
    if (usuario?.etapa === "todas") {
      setEtapaActiva(null);
      setPantalla("selectEtapa");
    } else {
      handleCerrarSesion();
    }
  }

  if (pantalla === "login") return <PantallaLogin onLogin={handleLogin} />;
  if (pantalla === "selectEtapa") return <PantallaSelectEtapa usuario={usuario} gestiones={gestiones} onSelect={e => { setEtapaActiva(e); setPantalla("listado"); }} onCerrarSesion={handleCerrarSesion} />;
  if (pantalla === "registros") return <PantallaRegistros gestiones={gestiones} cargando={cargandoGestiones} onVolver={() => setPantalla("listado")} />;
  if (pantalla === "whatsapp" && clienteActivo) return <PantallaWhatsApp cliente={clienteActivo} etapa={etapaActiva} gestiones={gestiones} onVolver={() => setPantalla("gestion")} />;
  if (pantalla === "gestion" && clienteActivo) return <PantallaGestion cliente={clienteActivo} etapa={etapaActiva} usuario={usuario} gestiones={gestiones} onGuardar={handleGuardarGestion} onVolver={handleVolverListado} onAbrirWhatsApp={() => setPantalla("whatsapp")} />;
  return <PantallaListado etapa={etapaActiva} usuario={usuario} gestiones={gestiones} onSeleccionarCliente={c => { setClienteActivo(c); setPantalla("gestion"); }} onVerRegistros={() => setPantalla("registros")} onCerrar={handleVolverSelectEtapa} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
